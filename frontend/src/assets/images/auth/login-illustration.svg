<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <defs>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fb"/>
      <stop offset="100%" style="stop-color:#e8ecf0"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e7b904"/>
      <stop offset="100%" style="stop-color:#f5d030"/>
    </linearGradient>
  </defs>
  <!-- Ground (warm tint on dark bg) -->
  <ellipse cx="250" cy="380" rx="220" ry="30" fill="rgba(231,185,4,0.15)"/>
  <!-- Main house body (light, pops on blue bg) -->
  <path d="M120 280 L120 180 L250 100 L380 180 L380 280 Z" fill="url(#houseGrad)" stroke="rgba(44,110,151,0.6)" stroke-width="2"/>
  <!-- Roof (gold accent) -->
  <path d="M100 180 L250 80 L400 180 L380 175 L250 95 L120 175 Z" fill="url(#roofGrad)" stroke="#c49b03" stroke-width="1"/>
  <!-- Door -->
  <rect x="215" y="220" width="70" height="60" rx="4" fill="#2c6e97"/>
  <circle cx="270" cy="250" r="4" fill="#e7b904"/>
  <!-- Windows left -->
  <rect x="140" y="200" width="45" height="40" rx="4" fill="#a8d4ea" stroke="#2c6e97" stroke-width="1"/>
  <line x1="162" y1="200" x2="162" y2="240" stroke="#2c6e97"/>
  <line x1="140" y1="220" x2="185" y2="220" stroke="#2c6e97"/>
  <!-- Windows right -->
  <rect x="315" y="200" width="45" height="40" rx="4" fill="#a8d4ea" stroke="#2c6e97" stroke-width="1"/>
  <line x1="337" y1="200" x2="337" y2="240" stroke="#2c6e97"/>
  <line x1="315" y1="220" x2="360" y2="220" stroke="#2c6e97"/>
  <!-- Decorative elements - trees (brand colors) -->
  <ellipse cx="70" cy="320" rx="35" ry="45" fill="rgba(44,110,151,0.9)"/>
  <rect x="55" y="340" width="30" height="40" fill="#1f4c6b" rx="2"/>
  <ellipse cx="430" cy="310" rx="28" ry="38" fill="rgba(231,185,4,0.4)"/>
  <rect x="418" y="325" width="24" height="35" fill="#2c6e97" rx="2"/>
</svg>
