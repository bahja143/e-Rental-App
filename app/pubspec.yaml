name: hanti_riyo
description: Hanti riyo - Find your perfect rental. Meel walba, riyo kasta Hanti riyo ayaa kuu dhow.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.1
  google_maps_flutter: ^2.5.0
  firebase_auth: ^5.3.4
  firebase_app_check: ^0.3.2+10
  google_sign_in: ^6.2.2
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  geolocator: ^13.0.2
  image_picker: ^1.0.7
  flutter_svg: ^2.0.9
  go_router: ^13.0.0
  shared_preferences: ^2.2.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/welcome/
    - assets/images/login_options/
    - assets/images/Estates Card/
    - assets/images/featured/
    - assets/images/logo.png
